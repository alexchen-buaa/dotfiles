- defaults:
        link:
                relink: true

- clean: ['~']

- clean:
        ~/:
                force: true
        ~/.config:
                recursive: true

- link:
        ~/.zshrc:
                path: zshrc
        ~/.bash_profile:
                path: bash_profile
        ~/.vimrc:
                path: vimrc
        ~/.condarc:
                path: condarc
        ~/.gitconfig:
                path: gitconfig
        ~/.inputrc:
                path: inputrc
        ~/.npmrc:
                path: npmrc
        ~/.tmux.conf:
                path: tmux.conf
        ~/.zsh_plugins.txt:
                path: zsh_plugins.txt
        ~/.config/tmuxthemes:
                path: config/tmuxthemes
        ~/.config/zsh:
                path: config/zsh
        ~/.config/alacritty:
                path: config/alacritty
        ~/.config/nvim:
                path: config/nvim
        ~/.config/pip:
                path: config/pip
        ~/.config/starship.toml:
                path: config/starship.toml
