[mgr]
prepend_keymap = [
  { on = "?", run = "help", desc = "Help" },

  { on = "z", run = "noop", desc = "Ranger-style z prefix" },
  { on = [ "z", "f" ], run = "filter --smart", desc = "Filter files" },
  { on = [ "z", "h" ], run = "hidden toggle", desc = "Toggle hidden files" },
  { on = "<C-h>", run = "hidden toggle", desc = "Toggle hidden files" },

  { on = "r", run = "open --interactive", desc = "Open with..." },

  { on = "y", run = "noop", desc = "Ranger-style yank prefix" },
  { on = [ "y", "y" ], run = "yank", desc = "Yank selected files (copy)" },

  { on = "d", run = "noop", desc = "Ranger-style delete prefix" },
  { on = [ "d", "d" ], run = "yank --cut", desc = "Yank selected files (cut)" },
  { on = [ "d", "T" ], run = "remove", desc = "Trash selected files" },
  { on = [ "d", "D" ], run = "remove --permanently", desc = "Permanently delete selected files" },

  { on = "p", run = "noop", desc = "Ranger-style paste prefix" },
  { on = [ "p", "p" ], run = "paste", desc = "Paste yanked files" },
  { on = [ "p", "o" ], run = "paste --force", desc = "Paste yanked files (overwrite)" },

  { on = [ "c", "w" ], run = "rename --cursor=before_ext", desc = "Rename selected file(s)" },
  { on = "a", run = "rename --cursor=end", desc = "Rename with cursor at end" },
  { on = "A", run = "rename --cursor=end", desc = "Rename with full filename selected" },
  { on = "I", run = "rename --cursor=start", desc = "Rename with cursor at start" },
  { on = "<Insert>", run = "create", desc = "Create a file or directory" },

  { on = "o", run = "noop", desc = "Ranger-style sort prefix" },
  { on = [ "o", "n" ], run = "sort natural --reverse=no", desc = "Sort naturally" },
  { on = [ "o", "N" ], run = "sort natural --reverse=yes", desc = "Sort naturally (reverse)" },
  { on = [ "o", "b" ], run = "sort alphabetical --reverse=no", desc = "Sort alphabetically" },
  { on = [ "o", "B" ], run = "sort alphabetical --reverse=yes", desc = "Sort alphabetically (reverse)" },
  { on = [ "o", "e" ], run = "sort extension --reverse=no", desc = "Sort by extension" },
  { on = [ "o", "E" ], run = "sort extension --reverse=yes", desc = "Sort by extension (reverse)" },
  { on = [ "o", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ], desc = "Sort by modified time" },
  { on = [ "o", "M" ], run = [ "sort mtime --reverse=yes", "linemode mtime" ], desc = "Sort by modified time (reverse)" },
  { on = [ "o", "s" ], run = [ "sort size --reverse=no", "linemode size" ], desc = "Sort by size" },
  { on = [ "o", "S" ], run = [ "sort size --reverse=yes", "linemode size" ], desc = "Sort by size (reverse)" },

  { on = [ "g", "t" ], run = "tab_switch 1 --relative", desc = "Switch to next tab" },
  { on = [ "g", "T" ], run = "tab_switch -1 --relative", desc = "Switch to previous tab" },
  { on = [ "g", "n" ], run = "tab_create --current", desc = "Create a new tab with CWD" },
  { on = [ "g", "c" ], run = "close", desc = "Close the current tab" },
]

[tasks]
prepend_keymap = [
  { on = "q", run = "close", desc = "Close task manager" },
]

[spot]
prepend_keymap = [
  { on = "q", run = "close", desc = "Close the spotter" },
]

[help]
prepend_keymap = [
  { on = "q", run = "close", desc = "Close help" },
]
